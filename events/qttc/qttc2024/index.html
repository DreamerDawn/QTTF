<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>页面建设中 - QTTF</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- 后备：meta 刷新（作为备用方案） -->
  <meta http-equiv="refresh" content="3;url=https://dreamerdawn.github.io/QTTF/homepage">
  <style>
    :root{
      --bg:#f6f8fb;
      --card:#ffffff;
      --accent:#0066ff;
      --accent-warn:#ff6b35;
      --muted:#6b7280;
      --max-width:1200px;
    }
    html,body{height:100%;margin:0;font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;color:#0b1220;background:linear-gradient(180deg,#f7fafc 0%, #eef4ff 100%);} 
    a{color:inherit;text-decoration:none}

    header{background:rgba(255,255,255,0.72);-webkit-backdrop-filter: blur(8px);backdrop-filter: blur(8px);box-shadow:0 6px 24px rgba(16,24,40,.06);position:sticky;top:0;z-index:1100;border-bottom:1px solid rgba(15,23,42,.03)}
    .container{max-width:var(--max-width);margin:0 auto;padding:0 28px}
    nav{display:flex;align-items:center;justify-content:space-between;height:64px}
    .brand{font-weight:700;font-size:20px;color:var(--accent)}
    .nav-links{display:flex;gap:20px}
    .nav-links a{color:var(--muted);padding:8px 10px;border-radius:8px;transition:all .18s;font-weight:600}
    .nav-links a:hover{background:rgba(0,102,255,.08);color:var(--accent)}
    .nav-links a.active{color:var(--accent);background:linear-gradient(90deg,rgba(0,102,255,.08),rgba(31,139,255,.06));box-shadow:none;border-radius:10px}

    main{padding:28px 0 56px;min-height:60vh;display:flex;align-items:center}

    .features{display:none}
    .card{background:linear-gradient(180deg,var(--card),var(--card));padding:14px;border-radius:14px;box-shadow:10px 12px 30px rgba(20,32,78,.04);border:1px solid rgba(15,23,42,.04);box-sizing:border-box}

    /* 提示卡片样式 */
    .notice-wrap{display:flex;align-items:center;justify-content:center;width:100%}
    .notice{max-width:720px;width:100%;padding:36px;border-radius:16px;background:#fff;box-shadow:0 12px 30px rgba(16,24,40,.06);border:1px solid rgba(15,23,42,.04);text-align:center}
    .notice h1{margin:0 0 8px;font-size:20px;font-weight:700;color:var(--accent-warn)}
    .notice p{margin:0 0 12px;font-size:18px;color:#0b1220}
    .notice .muted{color:var(--muted);font-size:14px;margin-top:8px}

    footer{padding:28px 0;text-align:center;color:var(--muted)}
  </style>

</head>
<body>
  <script src="https://keepandroidopen.org/banner.js?size=mini"></script>
  <header>
    <div class="container">
      <nav>
        <div style="display:flex;align-items:center;gap:10px">
          <img src="QTTF.png" alt="QTTF" style="height:40px;display:inline-block;border-radius:8px;object-fit:contain;"  />
          <div class="brand">QTTF</div>
        </div>
        <div class="nav-links">
            <a href="https://dreamerdawn.github.io/QTTF/homepage">首页</a>
            <a href="https://dreamerdawn.github.io/QTTF/events">赛事</a>
            <a href="https://dreamerdawn.github.io/QTTF/rankings">选手排名</a>
            <a href="https://dreamerdawn.github.io/QTTF/about">关于我们</a>
        </div>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="card notice-wrap">
      <div class="notice" role="status">
        <h1>🏓 抱歉，此页面正在开发中，<span style="color:var(--accent-warn)">即将上线，敬请期待！</span></h1>
        <p id="dev-message"><strong style="color:var(--accent-warn)">正在开发</strong> — 我们正在加速完善页面内容。</p>
        <div id="countdown" class="muted">3秒后自动返回首页</div>
      </div>
    </section>

    <!-- 预留：小组件容器（隐藏） -->
    <div class="features" aria-hidden="true"></div>
  </main>

  <footer>
    <div class="container">
      <p>本网页由Github Copilot生成，数据由丘班乒乓球联合会提供</p>
    </div>
  </footer>

  <script>
    (function(){
      const homeUrl = 'https://dreamerdawn.github.io/QTTF/homepage';
      let seconds = 3;
      const countdownEl = document.getElementById('countdown');

      function updateText(){
        if(countdownEl) countdownEl.textContent = `${seconds}秒后自动返回首页`;
      }

      updateText();
      const timer = setInterval(()=>{
        seconds -= 1;
        if(seconds > 0){
          updateText();
        } else {
          if(countdownEl) countdownEl.textContent = `0秒，正在跳转…`;
          clearInterval(timer);
          // 使用 replace 避免在历史中留下当前页
          window.location.replace(homeUrl);
        }
      }, 1000);

      // 如果用户点击导航，取消倒计时（导航会自行跳转）
      document.querySelectorAll('nav .nav-links a').forEach(a=>{
        a.addEventListener('click', ()=>{ clearInterval(timer); });
      });

      // 鼠标悬停高亮逻辑：悬停时高亮，离开时移除所有高亮（不设置默认高亮）
      const navLinks = document.querySelectorAll('nav .nav-links a');
      navLinks.forEach(a=>{
        a.addEventListener('mouseenter', ()=>{ navLinks.forEach(x=>x.classList.remove('active')); a.classList.add('active'); });
      });
      const navLinksContainer = document.querySelector('nav .nav-links');
      if(navLinksContainer) navLinksContainer.addEventListener('mouseleave', ()=>{ navLinks.forEach(x=>x.classList.remove('active')); });
    })();
  </script>
</body>
</html>
